pre-push:
  jobs:
    - name: build
      run: bun run build

pre-commit:
  parallel: true
  jobs:
    - name: "lint"
      run: bun run lint:eslint {staged_files}
      glob: "*.{js,ts,jsx,tsx}"
      stage_fixed: true

    - name: "format"
      run: bunx prettier --write {staged_files} --log-level silent
      glob: "*.{js,ts,jsx,tsx,md,json}"
      stage_fixed: true

    - name: "typecheck"
      run: bun run type-check
      glob: "*.{js,ts,jsx,tsx}"
